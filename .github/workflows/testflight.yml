name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number override (leave empty for auto-increment)"
        required: false
        type: string

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Determine build number
        id: build
        run: |
          if [ -n "${{ inputs.build_number }}" ]; then
            echo "number=${{ inputs.build_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build number
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: ${{ steps.build.outputs.number }}/" project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Archive
        run: |
          xcodebuild -project Artemis.xcodeproj \
            -scheme Artemis \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/Artemis.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Export and upload to TestFlight
        run: |
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/Artemis.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/Export \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Clean up
        if: always()
        run: rm -rf ~/.appstoreconnect

      - name: Summary
        run: |
          echo "### TestFlight Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ steps.build.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
