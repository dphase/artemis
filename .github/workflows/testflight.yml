name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number override (leave empty for auto-increment)"
        required: false
        type: string

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Determine build number
        id: build
        run: |
          if [ -n "${{ inputs.build_number }}" ]; then
            echo "number=${{ inputs.build_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build number
        run: |
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: ${{ steps.build.outputs.number }}/" project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision
          # Extract UUID for manual signing
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision)")
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          echo "Profile installed: $UUID"

      - name: Write ExportOptions
        run: |
          mkdir -p build
          /usr/libexec/PlistBuddy -c "Clear dict" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${{ secrets.TEAM_ID }}" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :uploadSymbols bool true" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :destination string upload" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.project93.artemis string iOS Team Store Provisioning Profile: com.project93.artemis" build/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :manageAppVersionAndBuildNumber bool true" build/ExportOptions.plist

      - name: Archive
        run: |
          xcodebuild -project Artemis.xcodeproj \
            -scheme Artemis \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/Artemis.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="iOS Team Store Provisioning Profile: com.project93.artemis" \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Export and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Artemis.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/Export \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Clean up
        if: always()
        run: |
          rm -rf ~/.appstoreconnect
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision

      - name: Summary
        run: |
          echo "### TestFlight Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build:** ${{ steps.build.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
